<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>BMAD Console</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="paper">
  <div id="root"></div>

  <!-- digest overlay -->
  <div id="digest" class="digest hidden" role="dialog" aria-modal="true" aria-labelledby="digestTitle">
    <div class="digest-card">
      <div class="masthead small">
        <span class="dateline" id="digestDateline">PORTFOLIO · ISSUE Nº — · DATE · AUTONOMY: AUTO</span>
      </div>
      <h1 id="digestTitle" class="digest-title">SINCE YOU LEFT — <span id="digestGap">—</span></h1>
      <div class="rule"></div>
      <ul id="digestList" class="digest-list"></ul>
      <div class="rule"></div>
      <h2 class="digest-sub">PENDING YOUR ATTENTION</h2>
      <ul id="digestPending" class="digest-pending"></ul>
      <div class="rule"></div>
      <button id="enterConsole" class="btn-enter">[  ENTER CONSOLE  ]</button>
    </div>
  </div>

  <!-- main shell -->
  <header class="masthead" id="masthead">
    <div class="masthead-row">
      <div class="masthead-title">
        <span class="masthead-name" id="projectName">BMAD-SWARM</span>
        <span class="masthead-sep">·</span>
        <span class="dateline" id="dateline">PORTFOLIO · ISSUE Nº — · DATE · AUTONOMY: AUTO</span>
      </div>
      <nav class="masthead-tabs" id="tabs">
        <button class="tab active" data-tab="dashboard">DASHBOARD</button>
        <button class="tab" data-tab="decisions">DECISIONS</button>
        <button class="tab" data-tab="sprint">SPRINT</button>
        <button class="tab" data-tab="network">NETWORK</button>
        <button class="tab" data-tab="writer">WRITER</button>
        <button class="tab-mode" id="modeToggle" title="paper / inverse">paper / inverse</button>
      </nav>
    </div>
    <div class="rule masthead-rule"></div>
  </header>

  <main class="main">
    <aside class="phase-ribbon" id="phaseRibbon" aria-label="Phase ribbon"></aside>
    <section class="canvas" id="canvas">
      <!-- view content injected by app.js -->
    </section>
  </main>

  <!-- replay scrubber (dashboard only; toggled by app.js) -->
  <div id="scrubberWrap" class="scrubber-wrap" aria-label="Replay scrubber"></div>

  <footer class="keybar" id="keybar">
    <span><kbd>d</kbd> decisions</span>
    <span><kbd>s</kbd> sprint</span>
    <span><kbd>n</kbd> network</span>
    <span><kbd>w</kbd> writer</span>
    <span><kbd>r</kbd> refresh</span>
    <span><kbd>t</kbd> paper/inverse</span>
    <span><kbd>l</kbd> live</span>
    <span><kbd>?</kbd> help</span>
  </footer>

  <script type="module" src="./app.js"></script>
</body>
</html>
